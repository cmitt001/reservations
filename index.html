<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reservation Manager — Air & Inside</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:#B8860B; --gold-dk:#9A7009; --gold-lt:#FAEEDA;
    --blue:#185FA5; --blue-dk:#0C447C; --blue-lt:#E6F1FB;
    --green-bg:#EAF3DE; --green-bd:#639922; --green-tx:#173404;
    --amber-bg:#FAEEDA; --amber-bd:#EF9F27; --amber-tx:#412402;
    --red-bg:#FCEBEB;   --red-bd:#E24B4A;   --red-tx:#501313;
    --bg:#F7F5F0; --surface:#FFFFFF; --surface2:#F5F3EE;
    --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
    --text:#1A1A18; --text2:#5F5E5A; --text3:#888780;
    --radius:10px; --radius-lg:14px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#18181A; --surface:#242428; --surface2:#2E2E33;
      --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
      --text:#F0EFEA; --text2:#B4B2A9; --text3:#888780;
      --green-bg:#1A2E0E; --green-bd:#3B6D11; --green-tx:#C0DD97;
      --amber-bg:#2E1E06; --amber-bd:#854F0B; --amber-tx:#FAC775;
      --red-bg:#2E0E0E;   --red-bd:#A32D2D;   --red-tx:#F7C1C1;
      --blue-lt:#0C2040; --gold-lt:#2E1A04;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;}
  /* layout */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
  .topbar-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:.01em;}
  .topbar-brand span{color:var(--gold);}
  .topbar-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#639922;}
  .status-dot.offline{background:#E24B4A;}
  .main{max-width:1000px;margin:0 auto;padding:1.25rem 1rem 4rem;}
  /* capacity strip */
  .cap-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
  .cap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem;}
  .cap-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;}
  .cap-card .nums{display:flex;align-items:baseline;gap:4px;margin-bottom:7px;}
  .cap-card .big{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;line-height:1;}
  .cap-card .of{font-size:12px;color:var(--text3);}
  .bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .bar-f{height:100%;border-radius:3px;transition:width .4s;}
  .f-ab{background:#B8860B;} .f-al{background:#E9A800;} .f-ae{background:#D4780B;} .f-ad{background:#9A6200;}
  .f-ib{background:#185FA5;} .f-il{background:#3A8FE0;} .f-ie{background:#0F4A80;} .f-id{background:#5B4FCF;}
  /* form panel */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem;}
  .panel-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;margin-bottom:1rem;}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fg{display:flex;flex-direction:column;gap:5px;}
  .fg label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
  .fg input,.fg select,.fg textarea{padding:0 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;height:38px;transition:border-color .15s;}
  .fg textarea{height:auto;padding:8px 10px;resize:vertical;}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.12);}
  .arrival-hint{font-size:12px;color:var(--text3);margin-top:4px;padding:6px 10px;background:var(--amber-bg);border-radius:6px;color:var(--amber-tx);}
  /* sitting preview */
  .sstrip{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:12px;}
  .sbox{border-radius:var(--radius);padding:10px 12px;border:2px solid;}
  .sbox-ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);}
  .sbox-warn{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);}
  .sbox-full{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);}
  .sbox-sel{box-shadow:0 0 0 3px var(--gold);}
  .sbox .slabel{font-size:10px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin-bottom:3px;}
  .sbox .sval{font-size:14px;font-weight:500;}
  .sbox .ssub{font-size:11px;margin-top:2px;opacity:.75;}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 18px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap;}
  .btn:hover{background:var(--surface);border-color:var(--border2);}
  .btn:active{transform:scale(.98);}
  .btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;}
  .btn-gold:hover{background:var(--gold-dk);border-color:var(--gold-dk);}
  .btn-blue{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn-blue:hover{background:var(--blue-dk);border-color:var(--blue-dk);}
  .btn-sm{height:30px;padding:0 12px;font-size:12px;}
  .form-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  /* messages */
  .msg{font-size:13px;border-radius:var(--radius);padding:9px 13px;margin-top:10px;display:none;}
  .msg.err{color:var(--red-tx);background:var(--red-bg);border:1px solid var(--red-bd);}
  .msg.warn{color:var(--amber-tx);background:var(--amber-bg);border:1px solid var(--amber-bd);}
  /* tabs */
  .tabs{display:flex;gap:3px;background:var(--surface2);border-radius:var(--radius);padding:3px;margin-bottom:1.25rem;overflow-x:auto;}
  .tab{flex:1;padding:8px 10px;text-align:center;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap;min-width:80px;}
  .tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border);}
  /* search row */
  .search-row{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
  .search-row input,.search-row select{height:36px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
  .search-row input{flex:1;min-width:150px;}
  .search-row input:focus,.search-row select:focus{border-color:var(--gold);}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
  .stat{background:var(--surface2);border-radius:var(--radius);padding:.75rem 1rem;}
  .stat .sl{font-size:12px;color:var(--text3);} .stat .sv{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin-top:2px;}
  /* reservation cards */
  .res-list{display:flex;flex-direction:column;gap:8px;}
  .res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 1.25rem;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;transition:border-color .15s;}
  .res-card:hover{border-color:var(--border2);}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;flex-shrink:0;}
  .av-ab{background:#FAEEDA;color:#633806;} .av-al{background:#F5E6A3;color:#412402;}
  .av-ae{background:#FAC775;color:#412402;} .av-ad{background:#EF9F27;color:#2C1600;}
  .av-ib{background:#E6F1FB;color:#0C447C;} .av-il{background:#B5D4F4;color:#042C53;}
  .av-ie{background:#DBEEFF;color:#042C53;} .av-id{background:#CECBF6;color:#26215C;}
  .ri h4{font-size:14px;font-weight:500;line-height:1.3;}
  .ri p{font-size:12px;color:var(--text3);margin-top:2px;}
  .ri .tags{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
  .b-cancel{background:var(--red-bg);color:var(--red-tx);}
  .arrival-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--text3);font-weight:500;}
  .card-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px 6px;border-radius:6px;transition:all .15s;font-family:'DM Sans',sans-serif;}
  .icon-btn:hover{color:var(--red-bd);background:var(--red-bg);}
  .card-meta{text-align:right;display:none;}
  .card-meta .ct{font-size:13px;font-weight:500;} .card-meta .cd{font-size:11px;color:var(--text3);}
  /* overview */
  .ov-toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem;}
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;}
  .ov-card h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:1rem;}
  .ov-date{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px;margin-top:16px;}
  .ov-row{margin-bottom:10px;}
  .ov-rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .ov-rname{font-size:13px;font-weight:500;} .ov-rtime{font-size:11px;color:var(--text3);}
  .ov-bar{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:4px;}
  .ov-barf{height:100%;border-radius:4px;}
  .ov-sub{display:flex;align-items:center;gap:8px;}
  .ov-status{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:.03em;border:1px solid;}
  .st-ok{background:var(--green-bg);color:var(--green-tx);border-color:var(--green-bd);}
  .st-warn{background:var(--amber-bg);color:var(--amber-tx);border-color:var(--amber-bd);}
  .st-full{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}
  /* loading */
  .loader{text-align:center;padding:2rem;color:var(--text3);font-size:14px;}
  /* responsive */
  @media(max-width:700px){
    .cap-strip{grid-template-columns:1fr 1fr;}
    .fgrid{grid-template-columns:1fr;}
    .sstrip{grid-template-columns:1fr 1fr;}
    .stats{grid-template-columns:1fr 1fr;}
    .ov-grid{grid-template-columns:1fr;}
    .res-card{grid-template-columns:auto 1fr;}
    .card-meta{display:none !important;}
  }
  @media(max-width:420px){
    .cap-strip{grid-template-columns:1fr 1fr;}
    .sstrip{grid-template-columns:1fr 1fr;}
    .topbar-status{display:none;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><span>Air</span> &amp; Inside</div>
  <div class="topbar-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-txt">Connecting...</span>
  </div>
</div>

<div class="main">
  <div class="cap-strip" id="cap-strip">
    <div class="cap-card"><div class="lbl">Loading...</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">New Reservation</div>
    <div class="fgrid">
      <div class="fg"><label>Guest Name</label><input type="text" id="f-name" placeholder="e.g. Sarah Johnson"/></div>
      <div class="fg"><label>Phone / Contact</label><input type="text" id="f-phone" placeholder="e.g. +1 555-0100"/></div>
      <div class="fg">
        <label>Venue</label>
        <select id="f-venue" onchange="onFormChange()">
          <option value="air">Air — Rooftop (54 seats)</option>
          <option value="inside">Inside (74 seats)</option>
        </select>
      </div>
      <div class="fg"><label>Party Size</label><input type="number" id="f-size" min="1" max="74" placeholder="e.g. 4" oninput="onFormChange()"/></div>
      <div class="fg">
        <label>Date</label>
        <input type="date" id="f-date" onchange="onFormChange()"/>
      </div>
      <div class="fg">
        <label>Sitting</label>
        <select id="f-sitting" onchange="onFormChange()">
          <option value="breakfast">Breakfast (8:00 AM – 10:30 AM)</option>
          <option value="lunch">Lunch (12:00 PM – 3:00 PM)</option>
          <option value="evening">Evening (4:00 PM – 7:00 PM)</option>
          <option value="dinner">Dinner (7:00 PM – 10:00 PM)</option>
        </select>
      </div>
      <div class="fg" id="arrival-group">
        <label>Estimated Arrival Time <span style="font-size:10px;color:var(--text3);">(staff asks guest)</span></label>
        <select id="f-arrival">
          <option value="">Not specified</option>
        </select>
        <div class="arrival-hint" id="arrival-hint"></div>
      </div>
      <div class="fg"><label>Special Requests</label><input type="text" id="f-notes" placeholder="e.g. Birthday, window seat"/></div>
      <div class="fg"><label>Email (optional)</label><input type="email" id="f-email" placeholder="guest@email.com"/></div>
    </div>
    <div id="sstrip" class="sstrip" style="display:none"></div>
    <div id="err-msg" class="msg err"></div>
    <div id="warn-msg" class="msg warn"></div>
    <div class="form-actions">
      <button class="btn btn-gold" onclick="addReservation()">Add Reservation</button>
      <button class="btn" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',this)">All</button>
    <button class="tab" onclick="switchTab('air',this)">Air (Rooftop)</button>
    <button class="tab" onclick="switchTab('inside',this)">Inside</button>
    <button class="tab" onclick="switchTab('overview',this)">Daily Overview</button>
  </div>

  <div id="search-row" class="search-row">
    <input type="text" id="search-input" placeholder="Search by name, phone…" oninput="renderList()"/>
    <select id="filter-date" onchange="renderList()"><option value="">All dates</option></select>
    <select id="filter-sitting" onchange="renderList()">
      <option value="">All sittings</option>
      <option value="breakfast">Breakfast</option>
      <option value="lunch">Lunch</option>
      <option value="evening">Evening</option>
      <option value="dinner">Dinner</option>
    </select>
  </div>

  <div id="stats-row" class="stats" style="display:none"></div>
  <div class="res-list" id="res-list"><div class="loader">Loading reservations…</div></div>
  <div id="ov-view" style="display:none"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // 1. CONFIGURATION
  const firebaseConfig = {
    apiKey: "AIzaSyBTFa8JNY2SoTwD0lYUHIVOBCiPWMqG_fo",
    authDomain: "resyst-reservation-system.firebaseapp.com",
    databaseURL: "https://resyst-reservation-system-default-rtdb.firebaseio.com/",
    projectId: "resyst-reservation-system",
    storageBucket: "resyst-reservation-system.firebasestorage.app",
    messagingSenderId: "76917955238",
    appId: "1:76917955238:web:c474390da268b81c72b267"
  };

  const CAPS = { air: 54, inside: 74 };
  const SITTINGS = {
    breakfast: { label:'Breakfast', time:'8:00 AM – 10:30 AM', slots:['8:00 AM','8:30 AM','9:00 AM','9:30 AM','10:00 AM','10:30 AM'], highTraffic:false },
    lunch:     { label:'Lunch',     time:'12:00 PM – 3:00 PM', slots:['12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM'], highTraffic:false },
    evening:   { label:'Evening',   time:'4:00 PM – 7:00 PM',  slots:['4:00 PM','4:30 PM','5:00 PM','5:30 PM','6:00 PM','6:30 PM','7:00 PM'], highTraffic:false },
    dinner:    { label:'Dinner',    time:'7:00 PM – 10:00 PM', slots:['7:00 PM','7:30 PM','8:00 PM','8:30 PM','9:00 PM','9:30 PM','10:00 PM'], highTraffic:true }
  };
  const SITTING_COLORS = {
    air:    { breakfast:'#B8860B', lunch:'#E9A800', evening:'#D4780B', dinner:'#9A6200' },
    inside: { breakfast:'#185FA5', lunch:'#3A8FE0', evening:'#0F4A80', dinner:'#5B4FCF' }
  };
  const AVATAR_CLS = {
    air:    { breakfast:'av-ab', lunch:'av-al', evening:'av-ae', dinner:'av-ad' },
    inside: { breakfast:'av-ib', lunch:'av-il', evening:'av-ie', dinner:'av-id' }
  };
  const BADGE_COLORS = {
    air: { breakfast:'background:#FAEEDA;color:#633806;', lunch:'background:#F5E6A3;color:#412402;', evening:'background:#FAC775;color:#412402;', dinner:'background:#EF9F27;color:#2C1600;' },
    inside:{ breakfast:'background:#E6F1FB;color:#0C447C;', lunch:'background:#B5D4F4;color:#042C53;', evening:'background:#DBEEFF;color:#042C53;', dinner:'background:#CECBF6;color:#26215C;' }
  };
  const CUTOFF = 17;

  let db, reservations = {}, currentTab = 'all';

  // 2. INITIALIZE
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    
    // Status Tracker
    db.ref('.info/connected').on('value', snap => {
      const online = snap.val();
      document.getElementById('status-dot').className = 'status-dot' + (online?'':' offline');
      document.getElementById('status-txt').textContent = online ? 'Live — all staff synced' : 'Connecting...';
    });

    // Real-time Sync
    db.ref('reservations').on('value', snap => {
      reservations = snap.val() || {};
      renderAll();
    });
  } catch(e) { console.error(e); }

  // 3. HELPERS
  function resList() { return Object.values(reservations); }
  function todayStr() { return new Date().toISOString().split('T')[0]; }
  function initials(n) { return n.trim().split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?'; }
  function formatDate(d) {
    if (!d) return '';
    return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }
  function bookedSeats(venue, date, sitting, excludeId) {
    return resList().filter(r=>r.venue===venue&&r.date===date&&r.sitting===sitting&&r.status==='active'&&r.id!==excludeId).reduce((s,r)=>s+r.size,0);
  }

  // 4. RENDERING LOGIC (THE STUFF THAT WAS MISSING)
  function renderAll() {
    renderCapStrip();
    if(currentTab === 'overview') {
      renderOverview();
    } else {
      renderList();
      renderStats();
    }
    updateDateFilter();
  }

  function renderCapStrip() {
    const today = todayStr();
    const venues = ['air','inside'];
    const sKeys = ['breakfast','lunch','evening','dinner'];
    document.getElementById('cap-strip').innerHTML = venues.flatMap(v=>
      sKeys.map(sk=>{
        const cap=CAPS[v], bkd=bookedSeats(v,today,sk,null), left=cap-bkd;
        const pct=Math.min(100,Math.round(bkd/cap*100));
        const fillCls=`f-${v==='air'?'a':'i'}${sk[0]}`;
        return `<div class="cap-card">
          <div class="lbl">${v.toUpperCase()} · ${SITTINGS[sk].label}</div>
          <div class="nums"><span class="big">${left}</span><span class="of">/ ${cap}</span></div>
          <div class="bar"><div class="bar-f ${fillCls}" style="width:${pct}%"></div></div>
        </div>`;
      })
    ).join('');
  }

  function renderList() {
    const q = (document.getElementById('search-input').value||'').toLowerCase();
    const fd = document.getElementById('filter-date').value;
    const fs = document.getElementById('filter-sitting').value;
    let list = resList().sort((a,b)=>b.created-a.created);

    if(currentTab === 'air') list = list.filter(r=>r.venue==='air');
    if(currentTab === 'inside') list = list.filter(r=>r.venue==='inside');
    if(q) list = list.filter(r=>[r.name,r.phone].join(' ').toLowerCase().includes(q));
    if(fd) list = list.filter(r=>r.date===fd);
    if(fs) list = list.filter(r=>r.sitting===fs);

    const el = document.getElementById('res-list');
    if(!list.length) { el.innerHTML='<div class="empty">No reservations found.</div>'; return; }

    el.innerHTML = list.map(r => {
      const si = SITTINGS[r.sitting] || {label:r.sitting};
      const avCls = (AVATAR_CLS[r.venue]||{})[r.sitting] || 'av-ab';
      const bdClass = r.status==='cancelled'?'b-cancel':'badge';
      return `<div class="res-card">
        <div class="avatar ${avCls}">${initials(r.name)}</div>
        <div class="ri">
          <h4>${r.name} <span style="font-size:11px;color:var(--text3);">· ${r.size} guests</span></h4>
          <p>${r.phone} · ${formatDate(r.date)}</p>
          <div class="tags"><span class="${bdClass}">${r.venue.toUpperCase()} · ${si.label}</span></div>
        </div>
        <div class="card-actions">
          <button class="icon-btn btn-sm" onclick="deleteRes('${r.id}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  function renderStats() {
    const active = resList().filter(r=>r.status==='active');
    document.getElementById('stats-row').innerHTML=`
      <div class="stat"><div class="sl">Total Active</div><div class="sv">${active.length}</div></div>
      <div class="stat"><div class="sl">Total Guests</div><div class="sv">${active.reduce((s,r)=>s+r.size,0)}</div></div>`;
    document.getElementById('stats-row').style.display='grid';
  }

  function renderOverview() {
    const today = todayStr();
    const dates = [...new Set([today,...resList().map(r=>r.date)])].sort().slice(0,7);
    let html = `<div class="ov-grid">`;
    ['air','inside'].forEach(venue => {
      html += `<div class="ov-card"><h3>${venue.toUpperCase()}</h3>`;
      dates.forEach(date => {
        html += `<div class="ov-date">${formatDate(date)}</div>`;
        ['breakfast','lunch','evening','dinner'].forEach(sk => {
          const bkd=bookedSeats(venue,date,sk,null), cap=CAPS[venue];
          html += `<div class="ov-row">${SITTINGS[sk].label}: ${bkd}/${cap} seats</div>`;
        });
      });
      html += `</div>`;
    });
    document.getElementById('ov-view').innerHTML = html + `</div>`;
  }

  // 5. INTERACTION FUNCTIONS
  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('ov-view').style.display = tab==='overview'?'block':'none';
    document.getElementById('res-list').style.display = tab==='overview'?'none':'flex';
    renderAll();
  }

  function onFormChange() {
    const venue = document.getElementById('f-venue').value;
    const sitting = document.getElementById('f-sitting').value;
    const date = document.getElementById('f-date').value;
    const si = SITTINGS[sitting];
    const arrSel = document.getElementById('f-arrival');
    arrSel.innerHTML = '<option value="">Not specified</option>' + si.slots.map(s=>`<option>${s}</option>`).join('');
    if(date) {
        document.getElementById('sstrip').style.display='grid';
        document.getElementById('sstrip').innerHTML = `<div class="sbox sbox-ok">Checking capacity for ${formatDate(date)}...</div>`;
    }
  }

  function addReservation() {
    const rec = {
      id: Date.now().toString(36),
      name: document.getElementById('f-name').value,
      phone: document.getElementById('f-phone').value,
      venue: document.getElementById('f-venue').value,
      size: parseInt(document.getElementById('f-size').value),
      date: document.getElementById('f-date').value,
      sitting: document.getElementById('f-sitting').value,
      status: 'active',
      created: Date.now()
    };
    db.ref('reservations/'+rec.id).set(rec).then(() => clearForm());
  }

  function deleteRes(id) { if(confirm('Delete?')) db.ref('reservations/'+id).remove(); }
  
  function clearForm() {
    ['f-name','f-phone','f-size'].forEach(id=>document.getElementById(id).value='');
    renderAll();
  }

  function updateDateFilter() {
    const sel = document.getElementById('filter-date');
    const dates = [...new Set(resList().map(r=>r.date))].sort();
    const cur = sel.value;
    sel.innerHTML = '<option value="">All dates</option>' + dates.map(d=>`<option value="${d}"${d===cur?' selected':''}>${formatDate(d)}</option>`).join('');
  }

  window.onload = () => {
    document.getElementById('f-date').value = todayStr();
    onFormChange();
  };
</script>
</body>
</html>
